# Render Blueprint – auto-configures services on Render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend (FastAPI + Python) ──────────────────────────
  - type: web
    name: aicoaching-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_API_KEY
        sync: false            # Fill this manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.9
